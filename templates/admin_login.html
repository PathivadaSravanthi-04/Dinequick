<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>

body{
    background:#ffd6e7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.container{
    background:white;
    padding:40px;
    border-radius:15px;
    text-align:center;
    box-shadow:0px 0px 15px gray;
}

input{
    width:250px;
    padding:10px;
    margin:10px;
}

button{
    padding:10px 20px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>ADMIN LOGIN</h1>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<br>

<input
type="password"
name="password"
placeholder="Password"
required>

<br><br>

<button type="submit">
Login
</button>

</form>

</div>

</body>
</html>
