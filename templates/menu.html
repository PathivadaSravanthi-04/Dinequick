<!DOCTYPE html>
<html>
<head>
    <title>Select Items</title>

    <style>

        body{
            background-color:#ffd6e7;
            font-family:Arial;
        }

        h1{
            text-align:center;
            color:black;
        }

        h2{
            text-align:center;
        }

        table{
            width:80%;
            margin:auto;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            border:1px solid black;
            padding:12px;
            text-align:center;
        }

        th{
            background-color:#f5b6c8;
        }

        input[type="number"]{
            width:60px;
            padding:5px;
        }

        .btn{
            display:block;
            margin:30px auto;
            padding:12px 25px;
            font-size:18px;
            font-weight:bold;
        }

    </style>
</head>

<body>

<h1>DINEQUICK MENU</h1>

<h2>Table Number: {{ table_no }}</h2>

<form method="POST" action="/place_order">

    <input type="hidden"
           name="table_no"
           value="{{ table_no }}">

    <table>

        <tr>
            <th>Item Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Quantity</th>
        </tr>

        {% for item in items %}

        <tr>

            <td>{{ item.name }}</td>

            <td>{{ item.category }}</td>

            <td>₹{{ item.price }}</td>

            <td>
                <input
                    type="number"
                    name="qty_{{ item.id }}"
                    value="0"
                    min="0">
            </td>

        </tr>

        {% endfor %}

    </table>

    <button class="btn" type="submit">
        Place Order
    </button>

</form>

</body>
</html>
