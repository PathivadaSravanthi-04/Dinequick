<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
</head>
<body>

<h1>Admin Dashboard</h1>

<form method="POST" action="/add_item">

<input
type="text"
name="name"
placeholder="Item Name"
required>

<input
type="text"
name="category"
placeholder="Category"
required>

<input
type="number"
step="0.01"
name="price"
placeholder="Price"
required>

<button type="submit">
Add Item
</button>

</form>

<hr>

<h2>Menu</h2>

{% for item in items %}

<p>
{{ item.name }}
-
₹{{ item.price }}
</p>

{% endfor %}

</body>
</html>
