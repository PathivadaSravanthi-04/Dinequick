<!DOCTYPE html>
<html>

<head>

    <title>Admin Dashboard</title>

    <style>

        body{
            background-color:#ffd6e7;
            font-family:Arial, sans-serif;
            margin:0;
            padding:30px;
        }

        h1{
            text-align:center;
            color:black;
            font-size:40px;
        }

        h2{
            text-align:center;
            color:black;
        }

        table{
            width:80%;
            margin:auto;
            border-collapse:collapse;
            background:white;
            box-shadow:0px 4px 10px gray;
        }

        th{
            background:#ff8fb1;
            color:white;
            padding:12px;
        }

        td{
            padding:12px;
            text-align:center;
            border:1px solid #ccc;
        }

        .form-box{
            width:450px;
            margin:40px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0px 4px 10px gray;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#ff4d88;
            color:white;
            border:none;
            font-size:18px;
            cursor:pointer;
            border-radius:5px;
        }

        button:hover{
            background:#e6005c;
        }

        .customer-btn{
            width:250px;
            margin:30px auto;
        }

    </style>

</head>

<body>

<h1>ADMIN DASHBOARD</h1>

<h2>Available Menu Items</h2>

<table>

<tr>
    <th>ID</th>
    <th>Item Name</th>
    <th>Category</th>
    <th>Price (₹)</th>
</tr>

{% for item in items %}

<tr>
    <td>{{ item.id }}</td>
    <td>{{ item.name }}</td>
    <td>{{ item.category }}</td>
    <td>{{ item.price }}</td>
</tr>

{% endfor %}

</table>

<div class="form-box">

<h2>Add New Item</h2>

<form action="/add_item" method="POST">

<input
type="text"
name="name"
placeholder="Item Name"
required>

<input
type="text"
name="category"
placeholder="Category"
required>

<input
type="number"
name="price"
placeholder="Price"
required>

<button type="submit">
Add Item
</button>

</form>

</div>

<div class="customer-btn">

<a href="/customer_login">

<button>
Start Customer Ordering
</button>

</a>

</div>

</body>

</html>
