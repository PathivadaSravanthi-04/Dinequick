<!DOCTYPE html>
<html>

<head>

<title>Customer Login</title>

<style>

body{
    background:#ffd6e7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.container{
    background:white;
    padding:40px;
    border-radius:15px;
    text-align:center;
    box-shadow:0px 5px 15px gray;
}

h1{
    color:black;
}

input{
    width:250px;
    padding:10px;
    margin:15px;
}

button{
    padding:10px 25px;
    background:#ff4d88;
    color:white;
    border:none;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#e6005c;
}

</style>

</head>

<body>

<div class="container">

<h1>CUSTOMER LOGIN</h1>

<form method="POST">

<input
type="text"
name="customer_name"
placeholder="Enter Your Name"
required>

<br>

<button type="submit">

Login

</button>

</form>

</div>

</body>

</html>
