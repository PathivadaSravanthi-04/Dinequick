<!DOCTYPE html>
<html>
<head>
    <title>Bill</title>
</head>
<body>

<h1>✅ Order Successful!</h1>

<h2>Bill Receipt</h2>

<p>Order ID: {{ order.id }}</p>
<p>Table No: {{ order.table_no }}</p>

<table border="1">
<tr>
    <th>Item</th>
    <th>Qty</th>
    <th>Price</th>
</tr>

{% for item in items %}
<tr>
    <td>{{ item.item_name }}</td>
    <td>{{ item.quantity }}</td>
    <td>₹{{ item.quantity * item.price }}</td>
</tr>
{% endfor %}

</table>

<h3>Total Amount: ₹{{ order.total }}</h3>

<p>Status: {{ order.status }}</p>

<a href="/">Place New Order</a>

</body>
</html>
